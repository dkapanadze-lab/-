<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meama Collect — საბონუსე სისტემა</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f4f4f4; font-family: 'Segoe UI', sans-serif; }
    input[type=range] { width: 100%; accent-color: #1a1a1a; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    button { font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const stages = [
      { label: "სთეიჯ 1", rating: "⭐ 3.7+", color: "#CD7F32", bg: "#FDF3E7", rates: { hot: 0.10, cold_cocktail: 0.25, cold_coffee: 0.15, alcohol: 0.40, wellness: 0.40 } },
      { label: "სთეიჯ 2", rating: "⭐ 4.1+", color: "#A0A0A0", bg: "#F5F5F5", rates: { hot: 0.20, cold_cocktail: 0.35, cold_coffee: 0.25, alcohol: 0.50, wellness: 0.50 } },
      { label: "სთეიჯ 3", rating: "⭐ 4.5+", color: "#DAA520", bg: "#FFFBEA", rates: { hot: 0.30, cold_cocktail: 0.50, cold_coffee: 0.35, alcohol: 0.65, wellness: 0.65 } },
    ];

    const categories = [
      { key: "hot", label: "☕ ცხელი სასმელი" },
      { key: "cold_cocktail", label: "🧋 ცივი კოქტეილი" },
      { key: "cold_coffee", label: "🧊 ცივი ყავა" },
      { key: "alcohol", label: "🍹 ალკოჰოლური" },
      { key: "wellness", label: "🌿 გამაჯანსაღებელი" },
    ];

    const kpiGroups = [
      {
        key: "sales", icon: "📈", label: "გაყიდვები და ზრდა", weight: 40,
        color: "#1a6b3a", bg: "#E8F5E9",
        items: ["Upsell / საშუალო ჩეკის ზრდა", "სალარო ოპერაციების სიზუსტე", "მომხმარებლის რეგისტრაცია და დაბრუნება"],
        who: "მონიტორინგი + თიმ ლიდერი + საოპერაციო ხელმძღვანელი"
      },
      {
        key: "cx", icon: "⭐", label: "მომხმარებლის გამოცდილება", weight: 20,
        color: "#1565C0", bg: "#E3F2FD",
        items: ["სერვისის ხარისხი და კომუნიკაცია", "პროდუქტის ხარისხი და სტანდარტი", "სიჩქარე და ეფექტურობა"],
        who: "მონიტორინგი (კამერა) + თიმ ლიდერი + მომხმარებლის შეფასება"
      },
      {
        key: "standards", icon: "🧹", label: "სტანდარტები და სისუფთავე", weight: 20,
        color: "#6A1B9A", bg: "#F3E5F5",
        items: ["ფილიალის სისუფთავე (შიდა/გარე)", "HACCP სტანდარტების დაცვა", "პირადი ჰიგიენა და გარეგნობა"],
        who: "მონიტორინგი + მისტიური სტუმარი + თიმ ლიდერი"
      },
      {
        key: "team", icon: "🤝", label: "გუნდი და განვითარება", weight: 20,
        color: "#E65100", bg: "#FFF3E0",
        items: ["დისციპლინა და პუნქტუალურობა", "გუნდური მუშაობა და კოორდინაცია", "ცოდნის ტესტი და ინიციატივა"],
        who: "თიმ ლიდერი + საოპერაციო ხელმძღვანელი + ტესტირება"
      },
    ];

    const TABS = ["🧮 კალკულატორი", "🏆 ბონუს სისტემა", "📊 KPI სისტემა"];

    function App() {
      const [tab, setTab] = useState(0);
      const [stage, setStage] = useState(0);
      const [sales, setSales] = useState({ hot: 0, cold_cocktail: 0, cold_coffee: 0, alcohol: 0, wellness: 0 });
      const [kpiScores, setKpiScores] = useState({ sales: 10, cx: 10, standards: 10, team: 10 });
      const [expandedKpi, setExpandedKpi] = useState(null);

      const perfBonus = categories.reduce((sum, c) => sum + (sales[c.key] || 0) * stages[stage].rates[c.key], 0);
      const kpiPct = kpiGroups.reduce((sum, g) => sum + (kpiScores[g.key] / 10) * g.weight, 0) / 100;
      const finalBonus = perfBonus * kpiPct;

      const scoreColor = (v) => v >= 8 ? "#2E7D32" : v >= 5 ? "#e67e22" : "#c0392b";

      const card = (children, style = {}) => (
        <div style={{ background: "white", borderRadius: "14px", padding: "18px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", marginBottom: "14px", ...style }}>{children}</div>
      );
      const sec = (t) => (
        <div style={{ fontSize: "15px", fontWeight: "800", color: "#1a1a1a", marginBottom: "14px", paddingBottom: "8px", borderBottom: "2px solid #f0f0f0" }}>{t}</div>
      );
      const NumInput = ({ val, onChange }) => (
        <input type="number" min="0" value={val}
          onChange={e => onChange(Math.max(0, Number(e.target.value) || 0))}
          style={{ width: 70, padding: "6px 10px", borderRadius: "8px", border: "1px solid #ddd", fontSize: 16, fontWeight: "700", textAlign: "center", outline: "none", fontFamily: "inherit" }} />
      );

      return (
        <div style={{ fontFamily: "'Segoe UI', sans-serif", background: "#f4f4f4", minHeight: "100vh", padding: "16px", maxWidth: "600px", margin: "0 auto" }}>

          <div style={{ background: "linear-gradient(135deg, #1a1a1a, #3a3a3a)", borderRadius: "16px", padding: "20px", marginBottom: "14px", color: "white", textAlign: "center" }}>
            <div style={{ fontSize: "11px", letterSpacing: "3px", opacity: 0.6, marginBottom: "4px" }}>MEAMA COLLECT</div>
            <div style={{ fontSize: "19px", fontWeight: "800", marginBottom: "8px" }}>ბარისტების საბონუსე სისტემა</div>
            <span style={{ background: "#FFD700", color: "#1a1a1a", padding: "3px 14px", borderRadius: "20px", fontSize: "12px", fontWeight: "700" }}>🆕 ამოქმედდება აპრილიდან</span>
          </div>

          <div style={{ display: "flex", gap: "6px", marginBottom: "16px" }}>
            {TABS.map((t, i) => (
              <button key={i} onClick={() => setTab(i)} style={{
                flex: 1, padding: "10px 6px", borderRadius: "10px", border: "none", cursor: "pointer",
                fontSize: "12px", fontWeight: "700",
                background: tab === i ? "#1a1a1a" : "white",
                color: tab === i ? "white" : "#777",
                boxShadow: tab === i ? "0 2px 8px rgba(0,0,0,0.2)" : "0 1px 4px rgba(0,0,0,0.08)"
              }}>{t}</button>
            ))}
          </div>

          {/* ===== CALCULATOR ===== */}
          {tab === 0 && <>
            {card(<>
              {sec("🏆 სთეიჯის არჩევა")}
              <div style={{ display: "flex", gap: "8px" }}>
                {stages.map((s, i) => (
                  <button key={i} onClick={() => setStage(i)} style={{
                    flex: 1, padding: "10px 6px", borderRadius: "10px",
                    border: `2px solid ${stage === i ? s.color : "#ddd"}`,
                    background: stage === i ? s.bg : "white", cursor: "pointer",
                    fontWeight: "700", fontSize: "12px", color: stage === i ? s.color : "#aaa"
                  }}>
                    <div>{s.label}</div><div style={{ fontSize: "10px", fontWeight: 500 }}>{s.rating}</div>
                  </button>
                ))}
              </div>
            </>)}

            {card(<>
              {sec("☕ გაყიდული სასმელები")}
              {categories.map(c => (
                <div key={c.key} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "10px", background: "#f8f9fa", borderRadius: "10px", padding: "10px 12px" }}>
                  <div>
                    <div style={{ fontSize: "13px", fontWeight: "600" }}>{c.label}</div>
                    <div style={{ fontSize: "11px", color: "#999" }}>₾{stages[stage].rates[c.key].toFixed(2)} / სასმელი</div>
                  </div>
                  <NumInput val={sales[c.key] || 0} onChange={v => setSales(s => ({ ...s, [c.key]: v }))} />
                </div>
              ))}
            </>)}

            {card(<>
              {sec("📊 KPI შეფასება")}
              <div style={{ fontSize: "12px", color: "#888", marginBottom: "14px" }}>თითოეული 0–10 სკალაზე • KPI პროპორციულად მოქმედებს ბონუსზე</div>
              {kpiGroups.map(g => (
                <div key={g.key} style={{ marginBottom: "14px", background: g.bg, borderRadius: "12px", padding: "12px 14px", border: `1px solid ${g.color}22` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "8px" }}>
                    <div>
                      <span style={{ fontSize: "13px", fontWeight: "700", color: g.color }}>{g.icon} {g.label}</span>
                      <span style={{ marginLeft: "8px", fontSize: "11px", background: g.color, color: "white", padding: "2px 7px", borderRadius: "10px" }}>{g.weight}%</span>
                    </div>
                    <span style={{ fontWeight: "800", fontSize: "16px", color: scoreColor(kpiScores[g.key]) }}>{kpiScores[g.key]}/10</span>
                  </div>
                  <input type="range" min={0} max={10} step={1} value={kpiScores[g.key]}
                    onChange={e => setKpiScores(s => ({ ...s, [g.key]: Number(e.target.value) }))} />
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: "10px", color: "#999", marginTop: "2px" }}>
                    <span>0</span><span>5</span><span>10</span>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: "#1a1a1a", borderRadius: "10px", padding: "12px 14px" }}>
                <span style={{ fontWeight: "700", fontSize: "13px", color: "white" }}>KPI საერთო პროცენტი</span>
                <span style={{ fontWeight: "800", fontSize: "20px", color: "#FFD700" }}>{(kpiPct * 100).toFixed(0)}%</span>
              </div>
            </>)}

            {/* Result */}
            <div style={{ background: "linear-gradient(135deg, #1a1a1a, #3a3a3a)", borderRadius: "14px", padding: "20px", color: "white", textAlign: "center" }}>
              <div style={{ display: "flex", justifyContent: "center", gap: "24px", marginBottom: "14px" }}>
                <div>
                  <div style={{ fontSize: "10px", opacity: 0.6, marginBottom: "2px" }}>პერფორმანს ბონუსი</div>
                  <div style={{ fontWeight: "700", fontSize: "18px", color: "#FFD700" }}>₾{perfBonus.toFixed(2)}</div>
                </div>
                <div style={{ opacity: 0.4, alignSelf: "center", fontSize: "22px" }}>×</div>
                <div>
                  <div style={{ fontSize: "10px", opacity: 0.6, marginBottom: "2px" }}>KPI</div>
                  <div style={{ fontWeight: "700", fontSize: "18px", color: "#FFD700" }}>{(kpiPct * 100).toFixed(0)}%</div>
                </div>
              </div>
              <div style={{ fontSize: "11px", opacity: 0.5, marginBottom: "4px" }}>საბოლოო ბონუსი</div>
              <div style={{ fontSize: "42px", fontWeight: "800", color: "#FFD700" }}>₾{finalBonus.toFixed(2)}</div>
              {kpiPct < 1 && <div style={{ fontSize: "11px", opacity: 0.6, marginTop: "6px" }}>სრული KPI-ით: ₾{perfBonus.toFixed(2)}</div>}
            </div>
          </>}

          {/* ===== BONUS SYSTEM ===== */}
          {tab === 1 && <>
            {card(<>
              {sec("🏆 პერფორმანს ბონუსი — ₾ სასმელზე")}
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12px" }}>
                  <thead>
                    <tr>
                      <th style={{ padding: "8px 10px", textAlign: "left", background: "#1a1a1a", color: "white" }}>კატეგორია</th>
                      {stages.map((s, i) => (
                        <th key={i} style={{ padding: "8px 10px", textAlign: "center", background: s.bg, color: s.color, borderLeft: "2px solid #f4f4f4" }}>
                          <div>{s.label}</div><div style={{ fontWeight: 500, fontSize: "10px" }}>{s.rating}</div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {categories.map((c, ci) => (
                      <tr key={c.key} style={{ background: ci % 2 === 0 ? "white" : "#fafafa" }}>
                        <td style={{ padding: "9px 10px", fontWeight: "600", color: "#333" }}>{c.label}</td>
                        {stages.map((s, si) => (
                          <td key={si} style={{ padding: "9px 10px", textAlign: "center", fontWeight: "700", color: s.color }}>₾{s.rates[c.key].toFixed(2)}</td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </>)}

            {card(<>
              {sec("⚙️ KPI-ს გავლენა ბონუსზე")}
              <div style={{ fontSize: "13px", color: "#555", lineHeight: "1.7", marginBottom: "12px" }}>
                საბოლოო ბონუსი პირდაპირ პროპორციულია KPI შესრულების პროცენტზე:
                <div style={{ background: "#f8f9fa", borderRadius: "10px", padding: "12px", margin: "10px 0", fontWeight: "700", fontSize: "14px", textAlign: "center" }}>
                  საბოლოო ბონუსი = პერფ. ბონუსი × KPI%
                </div>
                <strong>მაგალითი:</strong> ₾1000 × 70% KPI = <strong style={{ color: "#DAA520" }}>₾700</strong>
              </div>
              <div style={{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                {kpiGroups.map(g => (
                  <div key={g.key} style={{ flex: "1 1 45%", background: g.bg, borderRadius: "10px", padding: "10px", border: `1px solid ${g.color}33` }}>
                    <div style={{ fontSize: "12px", fontWeight: "700", color: g.color, marginBottom: "2px" }}>{g.icon} {g.label}</div>
                    <div style={{ fontSize: "20px", fontWeight: "800", color: g.color }}>{g.weight}%</div>
                  </div>
                ))}
              </div>
            </>)}
          </>}

          {/* ===== KPI SYSTEM ===== */}
          {tab === 2 && <>
            <div style={{ background: "#FFF3CD", borderRadius: "12px", padding: "12px 14px", marginBottom: "14px", fontSize: "12px", color: "#856404", border: "1px solid #FFD700" }}>
              📅 შეფასება ყოველთვიურად • შემფასებლები: მონიტორინგის სამსახური (კამერა) + ბარისტა თიმ ლიდერი + საოპერაციო ხელმძღვანელი
            </div>
            {kpiGroups.map((g, i) => (
              <div key={g.key} style={{ background: "white", borderRadius: "14px", marginBottom: "10px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", overflow: "hidden" }}>
                <div onClick={() => setExpandedKpi(expandedKpi === i ? null : i)}
                  style={{ padding: "14px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", borderLeft: `4px solid ${g.color}` }}>
                  <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                    <span style={{ fontSize: "22px" }}>{g.icon}</span>
                    <div>
                      <div style={{ fontWeight: "700", fontSize: "13px", color: g.color }}>{g.label}</div>
                      <div style={{ fontSize: "11px", color: "#999" }}>წონა: {g.weight}%</div>
                    </div>
                  </div>
                  <span style={{ color: "#aaa", fontSize: "16px" }}>{expandedKpi === i ? "▲" : "▼"}</span>
                </div>
                {expandedKpi === i && (
                  <div style={{ padding: "0 16px 14px", borderTop: "1px solid #f0f0f0" }}>
                    <div style={{ marginTop: "12px", marginBottom: "10px" }}>
                      {g.items.map((item, j) => (
                        <div key={j} style={{ display: "flex", gap: "8px", alignItems: "flex-start", marginBottom: "6px" }}>
                          <span style={{ color: g.color, fontWeight: "700", marginTop: "1px" }}>•</span>
                          <span style={{ fontSize: "12px", color: "#333" }}>{item}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{ background: "#f8f9fa", borderRadius: "10px", padding: "10px 12px" }}>
                      <div style={{ fontSize: "11px", fontWeight: "700", color: "#555", marginBottom: "3px" }}>👥 ვინ აფასებს:</div>
                      <div style={{ fontSize: "12px", color: "#333" }}>{g.who}</div>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </>}

          <div style={{ textAlign: "center", padding: "10px", fontSize: "11px", color: "#aaa" }}>
            Meama Collect | ბარისტების საბონუსე სისტემა | კონფიდენციალური
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
